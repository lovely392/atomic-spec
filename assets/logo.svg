<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <!-- Atom symbol: nucleus + orbits -->
  <g transform="translate(60, 60)">
    <!-- Orbits -->
    <ellipse cx="0" cy="0" rx="38" ry="14" stroke="#5b8df8" stroke-width="1.5" opacity="0.7" transform="rotate(-30)"/>
    <ellipse cx="0" cy="0" rx="38" ry="14" stroke="#22d49e" stroke-width="1.5" opacity="0.7" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="38" ry="14" stroke="#f5a623" stroke-width="1.5" opacity="0.7" transform="rotate(90)"/>
    <!-- Nucleus -->
    <circle cx="0" cy="0" r="8" fill="#e0e0f0"/>
    <!-- Electron dots (3 agents) -->
    <circle cx="33" cy="-19" r="4" fill="#5b8df8"/>  <!-- Analyst -->
    <circle cx="33" cy="19" r="4" fill="#22d49e"/>   <!-- Developer -->
    <circle cx="0" cy="-38" r="4" fill="#f5a623"/>   <!-- Tester -->
  </g>
  <!-- Text -->
  <text x="115" y="52" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#e0e0f0" letter-spacing="-1">
    Atomic Spec
  </text>
  <text x="115" y="76" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#52526a" letter-spacing="0.5">
    AI-native methodology for living requirements
  </text>
  <!-- Role labels -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="0.8">
    <rect x="115" y="88" width="60" height="20" rx="4" fill="#0a0f1f" stroke="#5b8df8" stroke-width="1"/>
    <text x="145" y="101" fill="#5b8df8" text-anchor="middle">ANALYST</text>
    <rect x="183" y="88" width="76" height="20" rx="4" fill="#061612" stroke="#22d49e" stroke-width="1"/>
    <text x="221" y="101" fill="#22d49e" text-anchor="middle">DEVELOPER</text>
    <rect x="267" y="88" width="58" height="20" rx="4" fill="#130e03" stroke="#f5a623" stroke-width="1"/>
    <text x="296" y="101" fill="#f5a623" text-anchor="middle">TESTER</text>
    <!-- Arrows between roles -->
    <text x="178" y="101" fill="#52526a" font-size="12">→</text>
    <text x="261" y="101" fill="#52526a" font-size="12">→</text>
  </g>
</svg>
